services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # プロジェクト全体をコンテナに同期（コード変更やSQLiteファイルがそのまま反映される）
      - .:/app
      # .venv だけはコンテナ専用の名前付きボリュームにする
      # （ホスト側の.venvはOSごとにバイナリが違うため、上のマウントで上書きされないようにする）
      - venv-data:/app/.venv
    command: uv run streamlit run app.py --server.address=0.0.0.0 --server.port=8501

volumes:
  venv-data:
